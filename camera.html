<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux-o-matic</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #764ba2;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* ── ???? ── */
        .stage {
            position: relative;
            width: 1200px;
            height: 750px;
            transform-origin: top center;
            flex-shrink: 0;
        }

        h1 {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            font-family: monospace;
            color: black;
            white-space: nowrap;
        }

        #logo {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: auto;
            border-radius: 50px;
            z-index: 20;
        }

        .buttons {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 20;
        }

        .button {
            width: 150px;
            padding: 15px 20px;
            background: #452564;
            color: white;
            border: 3px solid gold;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: block;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        #moeButton { display: none; }

        #photostrip {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 459px;
            z-index: 10;
            pointer-events: none;
        }

        /* ── idk what this does i was told to do it ── */
        #strip-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 500px;
            z-index: 5;
        }

        .photo-box {
            position: absolute;
            width: 265px;
            height: 205px;
            background: #ffffff;
            overflow: hidden;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #box1 { top: 43px;  left: 130px; }
        #box2 { top: 43px;  left: 417px; }
        #box3 { top: 264px; left: 130px; }
        #box4 { top: 264px; left: 417px; }

        /* ── this is live video i think ── */
        #camera {
            position: absolute;
            transform: scaleX(-1);   /* -1 means mirror */
            width: 265px;
            height: 205px;
            object-fit: cover;
            z-index: 9;
        }

        #countdown {
            position: absolute;
            width: 265px;
            height: 205px;
            font-size: 6rem;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 0 0 10px black;
            pointer-events: none;
            z-index: 12;
        }
    </style>
</head>

<body>
    <div class="stage" id="stage">

        <img id="logo" src="assets/logo.png" alt="Logo">
        <h1>Flux-o-matic</h1>

        <img id="photostrip" src="assets/photostrip.png" alt="Photostrip">

        <div id="strip-container">
            <video id="camera" autoplay playsinline></video>
            <div id="countdown"></div>
            <div class="photo-box" id="box1"><img id="photo1"></div>
            <div class="photo-box" id="box2"><img id="photo2"></div>
            <div class="photo-box" id="box3"><img id="photo3"></div>
            <div class="photo-box" id="box4"><img id="photo4"></div>
        </div>

        <div class="buttons">
            <button class="button" id="startButton">Start</button>
            <a href="sticker.html" class="button" id="moeButton">moe-ify!</a>
        </div>

    </div>

    <script>
        // ─────────────────────────────────────────────
        // idk what this does but i was told to put it in
        function scaleStage() {
            const stage = document.getElementById('stage');
            const scale = Math.min(window.innerWidth / 1200, window.innerHeight / 750);
            stage.style.transform = `scale(${scale})`;
            stage.style.marginTop = `${(window.innerHeight - 750 * scale) / 2}px`;
        }
        scaleStage();
        window.addEventListener('resize', scaleStage);



        // ─────────────────────────────────────────────
        // constantssssss soooo many constanttt
        const SCREEN_POSITIONS = [
            { left: 130, top: 43  },
            { left: 417, top: 43  },
            { left: 130, top: 264 },
            { left: 417, top: 264 } 
        ];

        const CANVAS_POSITIONS = [
            { left: 228, top: 39  },
            { left: 716, top: 39  },
            { left: 228, top: 417 },
            { left: 716, top: 417 },
        ];

        const HOLE_W = 451;
        const HOLE_H = 347;

        const STRIP_W = 1201;
        const STRIP_H = 787;

        const camera          = document.getElementById('camera');
        const countdownEl     = document.getElementById('countdown');
        const startButton     = document.getElementById('startButton');
        const moeButton       = document.getElementById('moeButton');

        const photos = [
            document.getElementById('photo1'),
            document.getElementById('photo2'),
            document.getElementById('photo3'),
            document.getElementById('photo4'),
        ];


        // ─────────────────────────────────────────────
        //  live feed
        function moveCameraToSlot(index) {
            const pos = SCREEN_POSITIONS[index];
            camera.style.left = pos.left + 'px';
            camera.style.top  = pos.top  + 'px';
            countdownEl.style.left = pos.left + 'px';
            countdownEl.style.top  = pos.top  + 'px';
        }


        // ─────────────────────────────────────────────
        // countdown timer 
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function runCountdown() {
            for (let i = 5; i > 0; i--) {
                countdownEl.textContent = i;
                await sleep(1000);
            }
            countdownEl.textContent = '';
        }


        // ─────────────────────────────────────────────
        //  take photo
        function captureFrame() {
            const boxAspect = 265 / 205;  // match your actual CSS box size
            const vW = camera.videoWidth;
            const vH = camera.videoHeight;
            const vAspect = vW / vH;

            let sx, sy, sw, sh;
            if (vAspect > boxAspect) {
                sh = vH; sw = vH * boxAspect; sx = (vW - sw) / 2; sy = 0;
            } else {
                sw = vW; sh = vW / boxAspect; sx = 0; sy = (vH - sh) / 2;
            }

            const canvas = document.createElement('canvas');
            canvas.width  = 265;
            canvas.height = 205;
            const ctx = canvas.getContext('2d');
            ctx.translate(265, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(camera, sx, sy, sw, sh, 0, 0, 265, 205);  // use crop coords
            return canvas.toDataURL('image/png');
        }


        // ─────────────────────────────────────────────
        // draw final pridcut
            async function saveFinalStrip() {
                const frame = new Image();
                frame.src = 'assets/photostrip.png';
                await new Promise(resolve => frame.onload = resolve);

                const canvas = document.createElement('canvas');
                canvas.width  = STRIP_W;
                canvas.height = STRIP_H;
                const ctx = canvas.getContext('2d');

                for (let i = 0; i < 4; i++) {
                    const pos = CANVAS_POSITIONS[i];

                    console.log(`Photo ${i + 1} natural size:`, photos[i].naturalWidth, photos[i].naturalHeight);
                    console.log(`Dest ${i + 1}:`, pos.left, pos.top, HOLE_W, HOLE_H);

                    ctx.drawImage(photos[i], 0, 0, 265, 205,
                                pos.left, pos.top, HOLE_W, HOLE_H);
                }

                ctx.drawImage(frame, 0, 0, STRIP_W, STRIP_H);
                localStorage.setItem('finalPhotostrip', canvas.toDataURL('image/png'));
            }

            async function startCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    camera.srcObject = stream;
                } catch (err) {
                    alert('Camera access failed: ' + err.message);
                }
            }

        // ─────────────────────────────────────────────
        //  Main photo booth flow
        async function startPhotoBooth() {
            await startCamera();
            startButton.style.display = 'none';

            for (let i = 0; i < 4; i++) {
                moveCameraToSlot(i);
                await runCountdown();

                const imageData = captureFrame();
                photos[i].src = imageData;
                await photos[i].decode();
                await sleep(800);
            }

            camera.style.display   = 'none';
            countdownEl.style.display = 'none';
            camera.srcObject.getTracks().forEach(t => t.stop());

            moeButton.style.display = 'block';

            try {
                await saveFinalStrip();
            } catch (err) {
                console.error('saveFinalStrip failed:', err);
            }
        }
        startButton.addEventListener('click', startPhotoBooth);
    </script>
</body>
</html>
