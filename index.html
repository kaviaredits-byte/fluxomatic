<!DOCTYPE html>
<!-- index (homepage) -->
 <html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux-o-matic</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #764ba2;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: relative;
            width: 1200px;
            height: 600px;
            text-align: center;
            margin: 0 auto
        }

        h1 {
            margin-top: 45px; 
            font-size: 3.5rem;
            color: black;
        }

        .button {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);

            padding: 12px 30px;
            border: none;
            border-radius: 5px;

            background: #452564;

            color: white;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;

            transition:
                transform 0.3s ease,
                box-shadow 0.3s ease;
        }

        .button:hover {
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        #homepage_photostrip {
            position: absolute;
            top: calc(47%);
            left: 25%;
            transform: translate(-50%, -50%);
            transform: translateY(-50%);

            width: 1000;
            height: auto;

            background: none;
            border: none;
            box-shadow: none;
        }

        #logo {
            position: absolute;
            top: 30px;
            transform: translate(-50%, -50%);
            
            width: 50px;
            height: auto;

            background: none;
            border: none;
            box-shadow: none;
        }
    </style>
</head>

<body>
    <div class="container">

        <img
            id="homepage_photostrip"
            src="assets/homepage_photostrip.png"
            alt="Photo Strip"
        >

        <img
            id="logo"
            src="assets/logo.png"
            alt="Logo"
            style="border-radius: 50px;"
        >

        <a href="second.html" class="button">
            Take pics
        </a>

    </div>
</body>
</html>
