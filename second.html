<!DOCTYPE html>

<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux-o-matic</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: monospace;
            background: #764ba2;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: relative;
            width: 1200px;
            height: 600px;
            text-align: center;
            margin: 0 auto
        }

        h1 {
            margin-top: 50px; 
            font-size: 3rem;
            color: black;
        }

        .side-buttons {
            position: absolute;
            right: 25%;
            top: 250px;

            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        .side-button {
            width: 220px;
            padding: 15px 20px;

            background: #452564;
            color: white;

            border: 3px solid gold;
            border-radius: 12px;

            font-size: 1rem;
            cursor: pointer;

            transition: 0.3s;
        }

        .side-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
        }
        
        #logo {
            position: absolute;
            top: 30px;
            transform: translate(-50%, -50%);
            
            width: 50px;
            height: auto;

            background: none;
            border: none;
            box-shadow: none;
        }

        .info-box {
            position: absolute;
            top: 130px;
            left: 20%; 
            width: 320px;
            height: 400px;

            background: #452564;
            border: 4px solid gold;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);

            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1rem;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            text-align: center;
        }

    </style>
</head>

<body>
