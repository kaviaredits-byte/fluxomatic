<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux-o-matic</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #764ba2;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .stage {
            position: relative;
            width: 1200px;
            height: 750px;
            transform-origin: top center;
            flex-shrink: 0;
        }

        h1 {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            color: black;
            white-space: nowrap;
            font-family: monospace;
        }

        #logo {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: auto;
            border-radius: 50px;
            z-index: 20;
        }

        .buttons {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 20;
        }

        .button {
            width: 150px;
            padding: 15px 20px;
            background: #452564;
            color: white;
            border: 3px solid gold;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: block;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        #moeButton { display: none; }

        /* frame and container share same position — same as camera page */
        #photostrip,
        #strip-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 459px;
        }

        #photostrip {
            height: auto;
            z-index: 10;
            pointer-events: none;
        }

        #strip-container {
            z-index: 5;
        }

        /* photo boxes — same positions as camera page */
        .photo-box {
            position: absolute;
            width: 265px;
            height: 205px;
            overflow: hidden;
            cursor: pointer;
        }

        /* empty state — dashed border prompts the user to click */
        .photo-box.empty {
            background: rgba(255, 255, 255, 0.15);
            border: 3px dashed rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-box.empty::after {
            content: "+";
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* filled state — show the image, hide the + */
        .photo-box.filled {
            background: none;
            border: none;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* hidden until a photo is loaded */
        }

        .photo-box.filled img {
            display: block;
        }

        /* hover on filled box hints it's replaceable */
        .photo-box.filled:hover::after {
            content: "replace";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            color: white;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #box1 { top: 23px;  left: 130px; }
        #box2 { top: 23px;  left: 417px; }
        #box3 { top: 244px; left: 130px; }
        #box4 { top: 244px; left: 417px; }

        /* hidden file input — triggered by clicking a box */
        #fileInput { display: none; }
    </style>
</head>

<body>
    <div class="stage" id="stage">

        <img id="logo" src="assets/logo.png" alt="Logo">
        <h1>Flux-o-matic</h1>

        <img id="photostrip" src="assets/photostrip.png" alt="Photostrip">

        <div id="strip-container">
            <div class="photo-box empty" id="box1"><img id="photo1"></div>
            <div class="photo-box empty" id="box2"><img id="photo2"></div>
            <div class="photo-box empty" id="box3"><img id="photo3"></div>
            <div class="photo-box empty" id="box4"><img id="photo4"></div>
        </div>

        <!-- one hidden file input, reused for all four boxes -->
        <input type="file" id="fileInput" accept="image/*">

        <div class="buttons">
            <button class="button" id="resetBtn">Reset</button>
            <a href="sticker.html" class="button" id="moeButton">moe-ify!</a>
        </div>

    </div>

    <script>
        // ---- scale stage to fit screen ----
        function scaleStage() {
            const stage = document.getElementById('stage');
            const scaleX = window.innerWidth  / 1200;
            const scaleY = window.innerHeight / 750;
            const scale  = Math.min(scaleX, scaleY);
            stage.style.transform = `scale(${scale})`;
            stage.style.marginTop = `${(window.innerHeight - 750 * scale) / 2}px`;
        }
        scaleStage();
        window.addEventListener('resize', scaleStage);

        // ---- state ----
        const photoImgs = [
            document.getElementById("photo1"),
            document.getElementById("photo2"),
            document.getElementById("photo3"),
            document.getElementById("photo4"),
        ];

        const boxes = [
            document.getElementById("box1"),
            document.getElementById("box2"),
            document.getElementById("box3"),
            document.getElementById("box4"),
        ];

        const framePositions = [
            { left: 130, top: 23  },
            { left: 417, top: 23  },
            { left: 130, top: 244 },
            { left: 417, top: 244 },
        ];

        let filledCount = 0;        
        let activeBox   = null;    
        const fileInput = document.getElementById("fileInput");

        boxes.forEach((box, i) => {
            box.addEventListener("click", () => {
                activeBox = i;
                fileInput.value = "";
                fileInput.click();
            });
        });

        fileInput.addEventListener("change", e => {
            const file = e.target.files[0];
            if (!file || activeBox === null) return;

            const reader = new FileReader();
            reader.onload = event => {
                const img = photoImgs[activeBox];
                const box = boxes[activeBox];
                const wasEmpty = box.classList.contains("empty");

                img.src = event.target.result;
                img.onload = () => {
                    box.classList.remove("empty");
                    box.classList.add("filled");

                    if (wasEmpty) {
                        filledCount++;
                        if (filledCount === 4) onAllFilled();
                    }
                };
            };
            reader.readAsDataURL(file);
        });

        // ---- called when all 4 boxes are filled ----
        function onAllFilled() {
            saveFinalStrip();
            document.getElementById("moeButton").style.display = "block";
        }

        // ---- reset: clear all boxes ----
        document.getElementById("resetBtn").addEventListener("click", () => {
            photoImgs.forEach(img => { img.src = ""; });
            boxes.forEach(box => {
                box.classList.remove("filled");
                box.classList.add("empty");
            });
            filledCount = 0;
            document.getElementById("moeButton").style.display = "none";
            localStorage.removeItem("finalPhotostrip");
        });

        // ---- save — identical logic to camera page ----
        async function saveFinalStrip() {
            const frame = new Image();
            frame.src = "assets/photostrip.png";
            await new Promise(resolve => { frame.onload = resolve; });

            const canvas = document.createElement("canvas");
            const ctx    = canvas.getContext("2d");
            canvas.width  = 1201;
            canvas.height = 787;

            const CANVAS_POSITIONS = [
                { left: 228, top: 39  },
                { left: 716, top: 39  },
                { left: 228, top: 417 },
                { left: 716, top: 417 },
            ];
            const HOLE_W = 451;
            const HOLE_H = 347;

            for (let i = 0; i < 4; i++) {
                const img = photoImgs[i];
                const pos = CANVAS_POSITIONS[i];

                // crop uploaded image to match hole aspect ratio
                const holeAspect = HOLE_W / HOLE_H;
                const imgAspect  = img.naturalWidth / img.naturalHeight;

                let sx, sy, sw, sh;
                if (imgAspect > holeAspect) {
                    sh = img.naturalHeight;
                    sw = sh * holeAspect;
                    sx = (img.naturalWidth - sw) / 2;
                    sy = 0;
                } else {
                    sw = img.naturalWidth;
                    sh = sw / holeAspect;
                    sx = 0;
                    sy = (img.naturalHeight - sh) / 2;
                }

                ctx.drawImage(img, sx, sy, sw, sh, pos.left, pos.top, HOLE_W, HOLE_H);
            }

            ctx.drawImage(frame, 0, 0, 1201, 787);

            localStorage.setItem("finalPhotostrip", canvas.toDataURL("image/png"));
            console.log("saved!");
        }
    </script>
</body>
</html>
